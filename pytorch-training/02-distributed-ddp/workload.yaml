apiVersion: harchos.harchcorp.io/v1
kind: Workload
metadata:
  name: resnet50-ddp-cifar10
  labels:
    category: pytorch-training
    difficulty: intermediate
spec:
  runtime: python:3.11
  command: torchrun --nproc_per_node=2 train_ddp.py --epochs 10 --batch-size 64 --lr 0.1
  replicas: 2
  resources:
    gpu:
      count: 2
      type: nvidia-a100
    memory: 32Gi
    cpu: "8"
  storage:
    - name: output
      mountPath: /output
      size: 50Gi
    - name: shared-rank
      mountPath: /shared
      size: 1Gi
      shared: true
  env:
    - name: PYTHONUNBUFFERED
      value: "1"
    - name: DIST_BACKEND
      value: nccl
  networking:
    enableInterNode: true
    port: 29500
  metrics:
    enable: true
    interval: 30s
