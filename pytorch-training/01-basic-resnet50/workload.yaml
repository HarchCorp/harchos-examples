apiVersion: harchos.harchcorp.io/v1
kind: Workload
metadata:
  name: resnet50-cifar10
  labels:
    category: pytorch-training
    difficulty: beginner
spec:
  runtime: python:3.11
  command: python train.py --epochs 10 --batch-size 64 --lr 0.01
  resources:
    gpu:
      count: 1
      type: nvidia-a100
    memory: 16Gi
    cpu: "4"
  storage:
    - name: output
      mountPath: /output
      size: 10Gi
  env:
    - name: PYTHONUNBUFFERED
      value: "1"
  metrics:
    enable: true
    interval: 30s
